name: Publish DevContainer Features

on:
  push:
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push work-dev-setup
        uses: docker/build-push-action@v4
        with:
          context: ./src/work-dev-setup
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devcontainer-features/work-dev-setup:latest
          file: ./src/work-dev-setup/Dockerfile
